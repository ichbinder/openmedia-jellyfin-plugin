name: Release Plugin ZIP

# Baut das Plugin und erstellt einen GitHub Release mit dem ZIP-Asset.
# Die openmedia-api holt von dort das ZIP, repackt es mit eingebetteter
# bootstrap.json und stellt es per Token-authentifiziertem Download aus.
#
# Stable Download-URL:
#   https://github.com/ichbinder/openmedia-jellyfin-plugin/releases/latest/download/openmedia.zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve version from tag
        id: ver
        run: |
          set -euo pipefail
          # Strip leading 'v' from tag (v1.1.0 → 1.1.0.0)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Ensure 4-part version for .NET
          PARTS=$(echo "$TAG_VERSION" | tr '.' '\n' | wc -l)
          if [ "$PARTS" -eq 3 ]; then
            VERSION="${TAG_VERSION}.0"
          else
            VERSION="$TAG_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (from tag: $GITHUB_REF_NAME)"

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.OpenMedia.sln

      - name: Build (Release)
        run: |
          dotnet build Jellyfin.Plugin.OpenMedia.sln \
            -c Release \
            --no-restore \
            /p:Version=${{ steps.ver.outputs.version }} \
            /p:AssemblyVersion=${{ steps.ver.outputs.version }} \
            /p:FileVersion=${{ steps.ver.outputs.version }}

      - name: Run tests
        run: dotnet test Jellyfin.Plugin.OpenMedia.Tests/Jellyfin.Plugin.OpenMedia.Tests.csproj -c Release --no-build --verbosity normal

      - name: Stage plugin artifacts
        id: stage
        run: |
          set -euo pipefail
          STAGE_DIR="$(mktemp -d)"
          BUILD_DIR="Jellyfin.Plugin.OpenMedia/bin/Release/net9.0"
          cp "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.dll" "$STAGE_DIR/"
          if [ -f "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.pdb" ]; then
            cp "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.pdb" "$STAGE_DIR/"
          fi
          if [ -f "publish/thumb.png" ]; then
            cp "publish/thumb.png" "$STAGE_DIR/"
          fi
          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$STAGE_DIR"

      - name: Generate meta.json (version + timestamp injected)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          STAGE_DIR: ${{ steps.stage.outputs.stage_dir }}
        run: |
          set -euo pipefail
          export TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)"
          python3 - <<'PY'
          import json, os
          src = "publish/meta.json"
          dst = os.path.join(os.environ["STAGE_DIR"], "meta.json")
          with open(src) as f:
              meta = json.load(f)
          meta["version"] = os.environ["VERSION"]
          meta["timestamp"] = os.environ["TIMESTAMP"]
          with open(dst, "w") as f:
              json.dump(meta, f, indent=2)
              f.write("\n")
          print(open(dst).read())
          PY

      - name: Package ZIP (deterministic file order, fixed timestamps)
        id: pkg
        env:
          STAGE_DIR: ${{ steps.stage.outputs.stage_dir }}
        run: |
          set -euo pipefail
          ZIP_NAME="openmedia.zip"
          ZIP_PATH="$GITHUB_WORKSPACE/$ZIP_NAME"
          # Normalize mtimes so MD5 is reproducible across re-runs.
          find "$STAGE_DIR" -exec touch -d "2020-01-01T00:00:00Z" {} +
          # Sort entries deterministically; -X strips extra attrs.
          (cd "$STAGE_DIR" && find . -type f | LC_ALL=C sort | zip -X -@ "$ZIP_PATH")
          MD5="$(md5sum "$ZIP_PATH" | cut -d' ' -f1)"
          SIZE="$(stat -c%s "$ZIP_PATH")"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "ZIP: $ZIP_PATH"
          echo "MD5: $MD5"
          echo "Size: $SIZE bytes"

      - name: Push artifacts to dist branch (backward compat)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ZIP_PATH: ${{ steps.pkg.outputs.zip_path }}
          MD5: ${{ steps.pkg.outputs.md5 }}
          SIZE: ${{ steps.pkg.outputs.size }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          DIST_DIR="$(mktemp -d)"
          git worktree add --detach "$DIST_DIR"
          (
            cd "$DIST_DIR"
            git checkout --orphan dist
            git rm -rf --quiet . || true
            cp "$ZIP_PATH" openmedia.zip
            echo "$VERSION" > version.txt
            printf '%s  openmedia.zip\n' "$MD5" > openmedia.zip.md5
            cat > README.md <<EOF
          # openmedia-jellyfin-plugin: dist

          Automatisch generierter Branch. Bitte nicht manuell editieren.

          - \`openmedia.zip\` — gebautes Plugin (DLL + meta.json + thumb.png)
          - \`version.txt\` — Plugin-Version (X.Y.Z.W)
          - \`openmedia.zip.md5\` — MD5 des ZIPs (md5sum-Format)

          Quelle: \`.github/workflows/release.yml\` auf main.
          Letzter Build: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Version: $VERSION
          ZIP-Groesse: $SIZE bytes
          MD5: $MD5
          EOF
            git add openmedia.zip version.txt openmedia.zip.md5 README.md
            git commit -m "build: dist $VERSION ($MD5)"
            git push origin dist --force
          )
          git worktree remove --force "$DIST_DIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "openmedia ${{ steps.ver.outputs.tag_version }}"
          body: |
            ## openmedia Jellyfin Plugin ${{ steps.ver.outputs.tag_version }}

            ### Was ist neu?
            - **bootstrap.json-Loader**: Personalisierte ZIPs koennen nun eine `bootstrap.json` mit `{apiUrl, apiToken}` enthalten. Das Plugin liest diese beim ersten Start, uebernimmt die Werte in die Konfiguration und loescht die Datei.

            ### Assets
            - `openmedia.zip` — Plugin-Archiv (DLLs + meta.json + thumb.png)
              - MD5: `${{ steps.pkg.outputs.md5 }}`

            ### Download-URL (stabil)
            ```
            https://github.com/ichbinder/openmedia-jellyfin-plugin/releases/latest/download/openmedia.zip
            ```
          files: |
            ${{ steps.pkg.outputs.zip_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
