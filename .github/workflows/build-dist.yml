name: Build & Publish dist

# Baut das Plugin und published Artefakte auf den orphan-Branch `dist`.
# Die openmedia-api zieht von dort `openmedia.zip` + `version.txt` und
# baked beim Auslefern eine User-spezifische `bootstrap.json` ein.
#
# Keine GitHub Releases mehr — Distribution lauft komplett ueber den
# dist-Branch via raw.githubusercontent.com.

on:
  push:
    branches:
      - main
    paths:
      - "Jellyfin.Plugin.OpenMedia/**"
      - "Jellyfin.Plugin.OpenMedia.Tests/**"
      - "publish/**"
      - "Directory.Build.props"
      - "Jellyfin.Plugin.OpenMedia.sln"
      - ".github/workflows/build-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dist
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve version from csproj
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(grep -oE '<Version>[^<]+</Version>' Jellyfin.Plugin.OpenMedia/Jellyfin.Plugin.OpenMedia.csproj | head -1 | sed -E 's#</?Version>##g')"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' aus csproj entspricht nicht dem Schema X.Y.Z.W"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.OpenMedia.sln

      - name: Build (Release)
        run: |
          dotnet build Jellyfin.Plugin.OpenMedia.sln \
            -c Release \
            --no-restore \
            /p:Version=${{ steps.ver.outputs.version }} \
            /p:AssemblyVersion=${{ steps.ver.outputs.version }} \
            /p:FileVersion=${{ steps.ver.outputs.version }}

      - name: Run tests
        run: dotnet test Jellyfin.Plugin.OpenMedia.Tests/Jellyfin.Plugin.OpenMedia.Tests.csproj -c Release --no-build --verbosity normal

      - name: Stage plugin artifacts
        id: stage
        run: |
          set -euo pipefail
          STAGE_DIR="$(mktemp -d)"
          BUILD_DIR="Jellyfin.Plugin.OpenMedia/bin/Release/net9.0"
          cp "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.dll" "$STAGE_DIR/"
          if [ -f "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.pdb" ]; then
            cp "$BUILD_DIR/Jellyfin.Plugin.OpenMedia.pdb" "$STAGE_DIR/"
          fi
          if [ -f "publish/thumb.png" ]; then
            cp "publish/thumb.png" "$STAGE_DIR/"
          fi
          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$STAGE_DIR"

      - name: Generate meta.json (version + timestamp injected)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          STAGE_DIR: ${{ steps.stage.outputs.stage_dir }}
        run: |
          set -euo pipefail
          export TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)"
          python3 - <<'PY'
          import json, os
          src = "publish/meta.json"
          dst = os.path.join(os.environ["STAGE_DIR"], "meta.json")
          with open(src) as f:
              meta = json.load(f)
          meta["version"] = os.environ["VERSION"]
          meta["timestamp"] = os.environ["TIMESTAMP"]
          with open(dst, "w") as f:
              json.dump(meta, f, indent=2)
              f.write("\n")
          print(open(dst).read())
          PY

      - name: Package ZIP (deterministic file order, fixed timestamps)
        id: pkg
        env:
          STAGE_DIR: ${{ steps.stage.outputs.stage_dir }}
        run: |
          set -euo pipefail
          ZIP_NAME="openmedia.zip"
          ZIP_PATH="$GITHUB_WORKSPACE/$ZIP_NAME"
          # Normalize mtimes so MD5 is reproducible across re-runs.
          find "$STAGE_DIR" -exec touch -d "2020-01-01T00:00:00Z" {} +
          # Sort entries deterministically; -X strips extra attrs.
          (cd "$STAGE_DIR" && find . -type f | LC_ALL=C sort | zip -X -@ "$ZIP_PATH")
          MD5="$(md5sum "$ZIP_PATH" | cut -d' ' -f1)"
          SIZE="$(stat -c%s "$ZIP_PATH")"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "ZIP: $ZIP_PATH"
          echo "MD5: $MD5"
          echo "Size: $SIZE bytes"

      - name: Push artifacts to dist branch
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ZIP_PATH: ${{ steps.pkg.outputs.zip_path }}
          MD5: ${{ steps.pkg.outputs.md5 }}
          SIZE: ${{ steps.pkg.outputs.size }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          DIST_DIR="$(mktemp -d)"
          # Orphan worktree — keine History, jeder Push uberschreibt komplett.
          git worktree add --detach "$DIST_DIR"
          (
            cd "$DIST_DIR"
            git checkout --orphan dist
            git rm -rf --quiet . || true
            cp "$ZIP_PATH" openmedia.zip
            echo "$VERSION" > version.txt
            printf '%s  openmedia.zip\n' "$MD5" > openmedia.zip.md5
            cat > README.md <<EOF
          # openmedia-jellyfin-plugin: dist

          Automatisch generierter Branch. Bitte nicht manuell editieren.

          - \`openmedia.zip\` — gebautes Plugin (DLL + meta.json + thumb.png)
          - \`version.txt\` — Plugin-Version (X.Y.Z.W)
          - \`openmedia.zip.md5\` — MD5 des ZIPs (md5sum-Format)

          Quelle: \`.github/workflows/build-dist.yml\` auf main.
          Letzter Build: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Version: $VERSION
          ZIP-Groesse: $SIZE bytes
          MD5: $MD5
          EOF
            git add openmedia.zip version.txt openmedia.zip.md5 README.md
            git commit -m "build: dist $VERSION ($MD5)"
            git push origin dist --force
          )
          git worktree remove --force "$DIST_DIR"
